name: Lint Changed Python Files

on:
  pull_request:
  workflow_dispatch:

jobs:
  ruff-changed-files:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Lint changed Python files only
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.sha || 'origin/main' }}"
          git fetch origin main --depth=1 || true
          mapfile -t PY_FILES < <(git diff --name-only "$BASE_REF"...HEAD -- '*.py' | grep -E '^(backend/|scripts/)' || true)
          if [ "${#PY_FILES[@]}" -eq 0 ]; then
            echo "No changed Python files."
            exit 0
          fi
          printf '%s\n' "${PY_FILES[@]}"
          ruff check --config backend/pyproject.toml "${PY_FILES[@]}"
