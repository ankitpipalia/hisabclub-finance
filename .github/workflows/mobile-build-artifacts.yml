name: Mobile Build Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-build-artifacts.yml"

permissions:
  contents: read

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android native project
        run: npx expo prebuild --platform android --no-install --clean

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisabclub-android-debug-apk-${{ github.sha }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios-simulator-app:
    name: iOS Simulator App
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build simulator app
        run: |
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          SCHEME="$(basename "$WORKSPACE" .xcworkspace)"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
          APP_PATH="$(find build/Build/Products -type d -name '*.app' -print -quit)"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" hisabclub-ios-simulator-app.zip

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: hisabclub-ios-simulator-app-${{ github.sha }}
          path: mobile/hisabclub-ios-simulator-app.zip
          if-no-files-found: error
