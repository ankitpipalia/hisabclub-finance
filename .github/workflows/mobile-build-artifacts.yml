name: Mobile Build Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-build-artifacts.yml"

permissions:
  contents: write

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        timeout-minutes: 5

      - name: Setup Node
        uses: actions/setup-node@v6
        timeout-minutes: 5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        timeout-minutes: 5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        timeout-minutes: 10

      - name: Install dependencies
        timeout-minutes: 12
        # react-test-renderer 19.2.6 has a strict peer dep on react@^19.2.6 but
        # Expo SDK 55 pins react to 19.2.0. The conflict is harmless at runtime
        # (test renderer is dev-only). --legacy-peer-deps reproduces the same
        # behaviour the developer gets locally.
        run: npm ci --legacy-peer-deps

      - name: Validate Expo dependency graph
        timeout-minutes: 5
        run: npx expo-doctor

      - name: Generate Android native project
        timeout-minutes: 8
        run: npx expo prebuild --platform android --no-install --clean

      - name: Build debug APK
        timeout-minutes: 20
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers=2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        timeout-minutes: 5
        with:
          name: hisabclub-android-debug-apk-${{ github.sha }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios-simulator-app:
    name: iOS Simulator App
    runs-on: macos-15
    timeout-minutes: 40
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        timeout-minutes: 5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        timeout-minutes: 5
        with:
          xcode-version: "26.2"

      - name: Setup Node
        uses: actions/setup-node@v6
        timeout-minutes: 5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        timeout-minutes: 12
        # react-test-renderer 19.2.6 has a strict peer dep on react@^19.2.6 but
        # Expo SDK 55 pins react to 19.2.0. The conflict is harmless at runtime
        # (test renderer is dev-only). --legacy-peer-deps reproduces the same
        # behaviour the developer gets locally.
        run: npm ci --legacy-peer-deps

      - name: Validate Expo dependency graph
        timeout-minutes: 5
        run: npx expo-doctor

      - name: Generate iOS native project
        timeout-minutes: 8
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        timeout-minutes: 15
        run: |
          cd ios
          pod install

      - name: Build simulator app
        timeout-minutes: 20
        run: |
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          SCHEME="$(basename "$WORKSPACE" .xcworkspace)"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build
          APP_PATH="$(find build/Build/Products -type d -name '*.app' -print -quit)"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" hisabclub-ios-simulator-app.zip

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        timeout-minutes: 5
        with:
          name: hisabclub-ios-simulator-app-${{ github.sha }}
          path: mobile/hisabclub-ios-simulator-app.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - android-apk
      - ios-simulator-app
    if: ${{ needs.android-apk.result == 'success' && needs.ios-simulator-app.result == 'success' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v8.0.1
        timeout-minutes: 5
        with:
          name: hisabclub-android-debug-apk-${{ github.sha }}
          path: release-assets/android

      - name: Download iOS artifact
        uses: actions/download-artifact@v8.0.1
        timeout-minutes: 5
        with:
          name: hisabclub-ios-simulator-app-${{ github.sha }}
          path: release-assets/ios

      - name: Create or update release
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          SHORT_SHA="${SHA::7}"
          TAG="mobile-build-${SHORT_SHA}"
          TITLE="Mobile Build ${SHORT_SHA}"
          ANDROID_FILE="$(find release-assets/android -type f -name '*.apk' -print -quit)"
          IOS_FILE="$(find release-assets/ios -type f -name '*.zip' -print -quit)"
          NOTES_FILE="$(mktemp)"

          cat > "$NOTES_FILE" <<EOF
          Automated mobile build for commit \`${SHA}\`.

          - Run: https://github.com/${REPO}/actions/runs/${RUN_ID}
          - Android asset: \`hisabclub-android-debug-${SHORT_SHA}.apk\`
          - iOS asset: \`hisabclub-ios-simulator-app-${SHORT_SHA}.zip\`
          EOF

          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --target "$SHA" \
              --prerelease
          fi

          gh release upload "$TAG" \
            "${ANDROID_FILE}#hisabclub-android-debug-${SHORT_SHA}.apk" \
            "${IOS_FILE}#hisabclub-ios-simulator-app-${SHORT_SHA}.zip" \
            --repo "$REPO" \
            --clobber
