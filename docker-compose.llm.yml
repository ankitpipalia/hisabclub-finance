# Optional LLM service overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.llm.yml up
#
# Before running, download the model:
#   mkdir -p models
#   wget -O models/qwq-32b-q4_k_m.gguf <model-url>

services:
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      --model /models/qwq-32b-q4_k_m.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 4096
      --n-gpu-layers 99
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
