services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure:3
    network_mode: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hisabclub:hisabclub_dev@localhost:6543/hisabclub
      DATABASE_URL_SYNC: postgresql://hisabclub:hisabclub_dev@localhost:6543/hisabclub
      REDIS_URL: redis://localhost:6769/0
      HOST: 0.0.0.0
      PORT: 8356
      UPLOAD_DIR: /app/uploads
      FRONTEND_DIST_DIR: /app/frontend/dist
      LLM_BASE_URL: http://127.0.0.1:8097/v1
      LLM_MODEL: Qwen3.6-27B-Q5_K_S.gguf
      LLM_STARTUP_VALIDATION: "false"
      LLM_REQUIRED_FOR_BOOT: "false"
      LOCAL_ALLOWED_LLM_HOSTS: localhost,127.0.0.1,::1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./frontend/dist:/app/frontend/dist:ro
      - ${LOCAL_DOCUMENTS_ROOT:-/home/ankit/Documents}:${LOCAL_DOCUMENTS_ROOT:-/home/ankit/Documents}:ro
      - ${LOCAL_DOWNLOADS_ROOT:-/home/ankit/Downloads}:${LOCAL_DOWNLOADS_ROOT:-/home/ankit/Downloads}:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8356/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hisabclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hisabclub_dev}
      POSTGRES_DB: ${POSTGRES_DB:-hisabclub}
    ports:
      - "6543:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hisabclub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6769:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
